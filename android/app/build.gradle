apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

// RN 0.83 + some libraries (Agora/Nitro) can hit CMake configure before
// library codegen JNI directories are generated. Ensure codegen runs first.
afterEvaluate {
    tasks.matching { it.name.startsWith("configureCMake") || it.name.startsWith("configureNdkBuild") }.configureEach { t ->
        def agoraCodegen = project.rootProject.findProject(":react-native-agora")?.tasks?.findByName("generateCodegenArtifactsFromSchema")
        if (agoraCodegen != null) {
            t.dependsOn(agoraCodegen)
        }

        def nitroCodegen = project.rootProject.findProject(":react-native-nitro-modules")?.tasks?.findByName("generateCodegenArtifactsFromSchema")
        if (nitroCodegen != null) {
            t.dependsOn(nitroCodegen)
        }
    }
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

apply from: new File(["node", "--print", "require.resolve('@sentry/react-native/package.json')"].execute().text.trim(), "../sentry.gradle")
android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.aira.app"

    defaultConfig {
        applicationId "com.aira.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 4
        versionName "1.0.0"
    }
sourceSets {
    main {
        assets.srcDirs = ['src/main/assets']
    }
}
    // ✅ ADD THIS BLOCK
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
       release {
    storeFile file("my-release-key.jks")
    storePassword "123456"
    keyAlias "my-key"
    keyPassword "123456"
}
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release   // ✅ FIXED
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Keep debug packaging stable with New Arch + native libs.
    // ABI splits can trigger packageDebug splitter failures in this setup.
    splits {
        abi {
            enable false
            reset()
        }
    }

    packagingOptions {
        resources {
            excludes += ["META-INF/*"]
        }
        jniLibs {
            pickFirsts += [
                "**/libc++_shared.so",
                "**/libfbjni.so"
            ]
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.fresco:animated-gif:3.3.0")
    implementation("com.facebook.fresco:animated-base:3.3.0")

    implementation "androidx.camera:camera-core:1.3.4"
    implementation "androidx.camera:camera-camera2:1.3.4"
    implementation "androidx.camera:camera-lifecycle:1.3.4"
    implementation "androidx.camera:camera-view:1.3.4"
    implementation "com.google.guava:guava:31.1-android"
    implementation "com.google.mlkit:face-detection:16.1.6"

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply plugin: 'com.google.gms.google-services'